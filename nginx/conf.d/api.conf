# ─── Backend API: api.ducdev04.pro.vn ──────────────────────────────────────────
# .NET 8 API chạy trên port 9000
# Có SignalR WebSocket + upload 50MB

# Map cho WebSocket upgrade (phải khai báo ở http context, trước server block)
map $http_upgrade $connection_upgrade {
    default  upgrade;
    ''       close;
}

server {
    listen 80;
    server_name api.ducdev04.pro.vn;

    # ── HTTPS redirect (bỏ comment sau khi có SSL cert) ──
    return 301 https://$host$request_uri;

    # Certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # File upload up to 50MB (match với API config)
    client_max_body_size 50M;

    # Proxy toàn bộ đến .NET API
    location / {
        proxy_pass         http://api:9000;
        proxy_http_version 1.1;

        # WebSocket support cho SignalR
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_buffering     off;
    }

    # SignalR hub endpoint (long-polling + WebSocket)
    location /hubs/ {
        proxy_pass         http://api:9000;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering     off;
    }
}

#── SSL Block (bỏ comment sau khi chạy certbot) ───────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name api.ducdev04.pro.vn;

    ssl_certificate     /etc/nginx/ssl/live/api.ducdev04.pro.vn/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/api.ducdev04.pro.vn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 50M;

    location / {
        proxy_pass         http://api:9000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  300s;
        proxy_buffering     off;
    }

    location /hubs/ {
        proxy_pass         http://api:9000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_buffering     off;
    }
}
