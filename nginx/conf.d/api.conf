# ─── Backend API: api-jobuptest.ducdev04.pro.vn ────────────────────────────────
# .NET 8 API chạy trên port 9000
# Có SignalR WebSocket + upload 50MB
#
# DEPLOY FLOW:
#   Phase 1 (HTTP - lấy cert): Giữ nguyên file này → chạy certbot
#   Phase 2 (HTTPS): Bỏ comment "# PHASE-2" bên dưới, comment "PHASE-1" block

# Map cho WebSocket upgrade (phải khai báo ở http context, trước server block)
map $http_upgrade $connection_upgrade {
    default  upgrade;
    ''       close;
}

# ─── HTTP Server (Port 80) ────────────────────────────────────────────────────
server {
    listen 80;
    server_name api-jobuptest.ducdev04.pro.vn;

    # Certbot webroot challenge (giữ luôn cả Phase 1 & 2)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # File upload up to 50MB (match với API config)
    client_max_body_size 50M;

    # ── PHASE-1: Proxy trực tiếp qua HTTP (dùng khi chưa có SSL cert) ──
    # Proxy toàn bộ đến .NET API
    location / {
        proxy_pass         http://api:9000;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_buffering     off;
    }

    # SignalR hub endpoint (long-polling + WebSocket)
    location /hubs/ {
        proxy_pass         http://api:9000;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering     off;
    }

    # ── PHASE-2: Redirect HTTP → HTTPS (bỏ comment sau khi có cert, comment PHASE-1 blocks ở trên) ──
    # location / {
    #     return 301 https://$host$request_uri;
    # }
}

