# ─── Admin Panel: admin-jobuptest.ducdev04.pro.vn ──────────────────────────────
# React SPA (Vite) được serve bởi Nginx nội bộ (container admin:80)
#
# DEPLOY FLOW:
#   Phase 1 (HTTP - lấy cert): Giữ nguyên file này → chạy certbot
#   Phase 2 (HTTPS): Bỏ comment "# PHASE-2" bên dưới, comment "PHASE-1" block

# ─── HTTP Server (Port 80) ────────────────────────────────────────────────────
server {
    listen 80;
    server_name admin-jobuptest.ducdev04.pro.vn;

    # Certbot webroot challenge (giữ luôn cả Phase 1 & 2)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── PHASE-1: Proxy trực tiếp qua HTTP (dùng khi chưa có SSL cert) ──
    location / {
        proxy_pass         http://admin:80;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
    }

    # ── PHASE-2: Redirect HTTP → HTTPS (bỏ comment sau khi có cert, comment PHASE-1 block ở trên) ──
    # location / {
    #     return 301 https://$host$request_uri;
    # }
}

