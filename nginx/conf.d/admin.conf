# ─── Admin Panel: admin.ducdev04.pro.vn ────────────────────────────────────────
# React SPA (Vite) được serve bởi Nginx nội bộ

server {
    listen 80;
    server_name admin.ducdev04.pro.vn;

    # ── HTTPS redirect (bỏ comment sau khi có SSL cert) ──
    # return 301 https://$host$request_uri;

    # Certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass         http://admin:80;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
    }
}

# ── SSL Block (bỏ comment sau khi chạy certbot) ───────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name admin.ducdev04.pro.vn;

    ssl_certificate     /etc/letsencrypt/live/ducdev04.pro.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ducdev04.pro.vn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass         http://admin:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
