# ─── Landing Page: jobuptest.ducdev04.pro.vn ───────────────────────────────────
# Next.js SSR chạy trên port 3000
# ⚡ PHASE 2 — HTTPS enabled (dùng sau khi certbot lấy cert thành công)

# ─── HTTP Server (Port 80) → Redirect to HTTPS ────────────────────────────────
server {
    listen 80;
    server_name jobuptest.ducdev04.pro.vn www.jobuptest.ducdev04.pro.vn;

    # Certbot webroot challenge (cần cho auto-renew)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect tất cả HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS Server (Port 443) ──────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name jobuptest.ducdev04.pro.vn www.jobuptest.ducdev04.pro.vn;

    ssl_certificate     /etc/nginx/ssl/live/jobuptest.ducdev04.pro.vn/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/jobuptest.ducdev04.pro.vn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass         http://landing:3000;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_buffering    off;
    }
}
